<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meva Puzzle Extreme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meva Puzzle: Extreme</h1>
        
        <div class="info-panel">
            <div class="score-row">Ball: <span id="score">0</span></div>
            <div id="bonus-info">Bonus: Eslab qolish +0s, O'yin +0s</div>
        </div>

        <div class="stats">
            <div class="stat-box">Level: <span id="level-display">1</span></div>
            <div class="stat-box">Vaqt: <span id="timer-display">20</span>s</div>
            <div class="stat-box">Jon: <span id="lives-display">❤️❤️❤️</span></div>
        </div>

        <div id="status">Tayyorlaning!</div>

        <div class="grid" id="grid"></div>

        <div class="controls">
            <button id="next-btn" class="btn success" onclick="nextLevel()" style="display:none;">Keyingi ➔</button>
            <button id="retry-btn" class="btn warning" onclick="retryLevel()" style="display:none;">Qayta urinish ↻</button>
            <button class="btn danger" onclick="location.reload()">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
